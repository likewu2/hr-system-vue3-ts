server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hrdb?useSSL=false&serverTimezone=UTC
    username: root
    password: yourpassword
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

logging:
  level:
    com.example.hr: DEBUG

jwt:
  secret: your-very-secure-jwt-secret-key-here-32-bytes-min
  expiration: 86400000